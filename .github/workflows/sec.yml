name: Go Security Checks
on:
  push:
    branches:
      - master

jobs:
  gosec:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - name: Run Gosec Security Scanner
        run: make sec
